// ─── MAIN COMPONENT ────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function StressQuiz() {
  const [screen, setScreen] = useState("intro"); // intro | quiz | email | results
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [selected, setSelected] = useState(null);
  const [email, setEmail] = useState("");
  const [firstName, setFirstName] = useState("");
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [aiInsight, setAiInsight] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [animating, setAnimating] = useState(false);
  const resultsRef = useRef(null);
  const [quizQs] = useState(() => QUESTIONS.map(qq => ({ ...qq, options: shuffle(qq.options) })));

  const q = quizQs[current];
  const progress = (current / quizQs.length) * 100;

  function handleSelect(option) {
    if (animating) return;
    setSelected(option);
    track("question_answered", { question_index: current + 1, domain: q.domain, response_type: option.type });
    const newAnswers = { ...answers, [q.id]: { type: option.type, domain: q.domain } };
    setAnswers(newAnswers);
    setAnimating(true);
    setTimeout(() => {
      setSelected(null);
      setAnimating(false);
      if (current < quizQs.length - 1) {
        setCurrent(current + 1);
      } else {
        track("email_gate_view", {});
        setScreen("email");
      }
    }, 260);
  }

  function handleBack() {
    if (current === 0) return;
    const prev = current - 1;
    setCurrent(prev);
    const prevAns = answers[quizQs[prev].id];
    setSelected(prevAns ? quizQs[prev].options.find(o => o.type === prevAns.type) : null);
  }

  function computeScores(ans) {
    const totals = { fight: 0, flight: 0, freeze: 0, fawn: 0 };
    const byDomain = {};
    Object.values(ans).forEach(({ type, domain }) => {
      totals[type]++;
      if (!byDomain[domain]) byDomain[domain] = { fight: 0, flight: 0, freeze: 0, fawn: 0 };
      byDomain[domain][type]++;
    });
    const primary = Object.entries(totals).sort((a, b) => b[1] - a[1])[0][0];
    const secondary = Object.entries(totals).sort((a, b) => b[1] - a[1])[1][0];
    return { totals, byDomain, primary, secondary };
  }

  async function handleEmailSubmit(e) {
    e.preventDefault();
    if (!email || !firstName) return;
    setLoading(true);
    const scores = computeScores(answers);
    track("lead_submit", {});
    track("quiz_complete", { primary: scores.primary, secondary: scores.secondary });
    track("outcome", { outcome: scores.primary });
    if (window.fbq) fbq("track", "Lead");
    setResults(scores);
    setScreen("results");
    setLoading(false);
    // Lead capture + the AI insight both come back from the Worker in one request.
    if (LEAD_ENDPOINT) {
      if (AI_ENABLED) setAiLoading(true);
      fetch(LEAD_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          firstName, email, consent: true,
          outcome: scores.primary, secondary: scores.secondary,
          scores: scores.totals, attribution: ATTRIBUTION,
        }),
      })
        .then((r) => r.json())
        .then((r) => { if (AI_ENABLED) setAiInsight((r && r.insight) || ""); })
        .catch(() => {})
        .finally(() => { if (AI_ENABLED) setAiLoading(false); });
    }
  }

  // ── SCREENS ──────────────────────────────────────────────────────────────────

  if (screen === "intro") return <IntroScreen onStart={() => { track("quiz_start", { source: ATTRIBUTION.utm_source || "direct" }); if (window.fbq) fbq("trackCustom", "QuizStart"); setScreen("quiz"); }} />;
  if (screen === "quiz") return (
    <QuizScreen
      q={q}
      current={current}
      total={quizQs.length}
      progress={progress}
      selected={selected}
      onSelect={handleSelect}
      onBack={handleBack}
      canGoBack={current > 0}
      animating={animating}
      domain={DOMAINS[q.domain]}
    />
  );
  if (screen === "email") return (
    <EmailScreen
      firstName={firstName}
      setFirstName={setFirstName}
      email={email}
      setEmail={setEmail}
      onSubmit={handleEmailSubmit}
      loading={loading}
    />
  );
  if (screen === "results" && results) return (
    <ResultsScreen
      results={results}
      firstName={firstName}
      aiInsight={aiInsight}
      aiLoading={aiLoading}
    />
  );
  return null;
}

            <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "14px 20px", border: "1px solid #e8e3dd", display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ color: BRAND.orange, fontWeight: 700, marginTop: 2 }}>→</span>
              <span style={{ fontSize: 15, color: "#444", lineHeight: 1.6 }}>{c}</span>
            </div>
          ))}
        </div>

        {/* REGULATION TOOLS */}
        <SectionHeader icon="🛠️" title="Regulation Tools for Your Type" />
        <div style={{ display: "grid", gap: 14 }}>
          {deepInfo.regulation.map((r, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 14, padding: "24px", border: `1px solid ${primaryInfo.color}20` }}>
              <div style={{ fontWeight: 700, fontSize: 16, color: BRAND.black, marginBottom: 8 }}>
                <span style={{ color: primaryInfo.color, marginRight: 8 }}>{["01", "02", "03"][i]}</span>
                {r.title}
              </div>
              <p style={{ color: "#666", fontSize: 15, lineHeight: 1.7, margin: 0 }}>{r.desc}</p>
            </div>
          ))}
        </div>

        {AI_ENABLED && (<>
        {/* AI PERSONALISED INSIGHT */}
        <SectionHeader icon="✨" title={`Your Personalised Insight${firstName ? `, ${firstName}` : ""}`} />
        <div style={{ background: BRAND.black, borderRadius: 16, padding: "32px", color: "#fff" }}>
          {aiLoading ? (
            <div style={{ textAlign: "center", padding: "20px" }}>
              <div style={{ fontSize: 13, color: "#666", letterSpacing: "0.1em" }}>Generating your personalised analysis…</div>
              <div style={{ display: "flex", gap: 6, justifyContent: "center", marginTop: 16 }}>
                {[0, 1, 2].map(i => (
                  <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: BRAND.orange, animation: `pulse 1.2s ${i * 0.4}s infinite` }} />
                ))}
              </div>
            </div>
          ) : aiInsight ? (
            <div>
              {aiInsight.split("\n\n").filter(p => p.trim()).map((para, i) => {
                const isHeader = para.match(/^[A-Z\s()]+:/);
                if (isHeader) {
                  const [header, ...rest] = para.split(":");
                  return (
                    <div key={i} style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 11, color: primaryInfo.color, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 700, marginBottom: 8 }}>{header}</div>
                      <p style={{ color: "#ccc", fontSize: 15, lineHeight: 1.8, margin: 0 }}>{rest.join(":").trim()}</p>
                    </div>
                  );
                }
                return <p key={i} style={{ color: "#ccc", fontSize: 15, lineHeight: 1.8, margin: "0 0 16px" }}>{para}</p>;
              })}
            </div>
          ) : (
            <p style={{ color: "#666", textAlign: "center" }}>Your personalised insight could not be generated at this time.</p>
          )}
        </div>

        </>)}

        {/* CTA */}
        <div style={{ background: `linear-gradient(135deg, ${BRAND.orange}, ${BRAND.green})`, borderRadius: 20, padding: "40px 32px", textAlign: "center", marginTop: 32, color: "#fff" }}>
          <h3 style={{ fontSize: 26, fontWeight: 800, margin: "0 0 12px" }}>Ready to go deeper?</h3>
          <p style={{ fontSize: 16, opacity: 0.9, margin: "0 0 28px", lineHeight: 1.6 }}>
            Understanding your stress response is the first step. Working with it, in learning, relationships, and daily life, is where the real change happens.
          </p>
          <a
            href="https://api.leadconnectorhq.com/widget/booking/ktnCWMUydaVYrfYSpCdi"
            target="_blank"
            rel="noreferrer"
            onClick={() => track("cta_click", { location: "results" })}
            style={{
              display: "inline-block",
              background: "#fff",
              color: BRAND.black,
              padding: "16px 40px",
              borderRadius: 10,
              fontWeight: 700,
              fontSize: 16,
              textDecoration: "none",
              fontFamily: "'Poppins', sans-serif",
            }}
          >
            Book a Free Discovery Call →
          </a>
        </div>

        {/* DISCLAIMER */}
        <p style={{ fontSize: 12, color: "#999", lineHeight: 1.7, textAlign: "center", maxWidth: 620, margin: "28px auto 0" }}>
          This quiz is a self-reflection tool, not a clinical assessment, diagnosis, or treatment, and it does not replace care from a qualified health professional. The patterns and practices described are general educational information. If you are in distress or crisis, please reach out for support right away. In Canada and the US you can call or text 988 for the Suicide and Crisis Lifeline, any time, or contact your local emergency services.
        </p>
      </div>

      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 0.3; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1); }
        }
      `}</style>
    </div>
  );
}

function Card({ children, style = {} }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "24px", border: "1px solid #e8e3dd", marginBottom: 12, ...style }}>
      {children}
    </div>
  );
}

function SectionHeader({ icon, title }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "36px 0 16px" }}>
      <span style={{ fontSize: 20 }}>{icon}</span>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: BRAND.black, margin: 0 }}>{title}</h2>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<StressQuiz />);
  </script>
</body>
</html>
